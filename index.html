<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banco Família Feliz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .header {
      background: #000;
      color: #00bcd4;
      text-align: center;
      padding: 24px 20px 8px;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .saldo-label {
      color: #555;
      text-align: center;
      font-size: 13px;
      padding-bottom: 8px;
      letter-spacing: 1px;
    }
    .saldo-box {
      text-align: center;
      padding: 20px;
      font-size: 52px;
      font-weight: bold;
    }
    .id-box {
      color: #444;
      text-align: center;
      font-size: 12px;
      padding-bottom: 16px;
    }
    .footer {
      background: #0d47a1;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .loading { color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">Banco Família Feliz</div>
    <div class="saldo-label">SALDO DISPONÍVEL</div>
    <div class="saldo-box loading" id="saldo">Carregando...</div>
    <div class="id-box" id="idbox"></div>
    <div class="footer">Evangelismo Escola</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id") || "";
    document.getElementById("idbox").textContent = id ? "ID: " + id : "";

    fetch("https://script.google.com/macros/s/AKfycbydZbZlDPisBvdMvcZmmpfbDqB-O6NFzNE6mQFIEOiZ1aC43HRs_yvHFdRisdOVMANz/exec?id=" + id)
      .then(r => r.text())
      .then(html => {
        const match = html.match(/class="saldo-box[^"]*"[^>]*>(.*?)<\/div>/s);
        const saldo = match ? match[1].trim() : "Erro";
        const el = document.getElementById("saldo");
        el.textContent = saldo;
        el.style.color = saldo.includes("R$") ? "#00e676" : "#ef5350";
      })
      .catch(() => {
        document.getElementById("saldo").textContent = "Erro";
        document.getElementById("saldo").style.color = "#ef5350";
      });
  </script>
</body>
</html>
