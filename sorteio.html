<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sorteio - Projeto Família Feliz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: row;
      gap: 32px;
      flex-wrap: wrap;
      padding: 32px 16px;
    }

    .card {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: center;
      flex-shrink: 0;
    }
    .header {
      background: #000;
      color: #00bcd4;
      padding: 24px 20px 8px;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .sub {
      color: #555;
      font-size: 13px;
      padding-bottom: 8px;
      letter-spacing: 1px;
    }
    .nome-box {
      color: #ffd600;
      padding: 24px 16px;
      font-size: 36px;
      font-weight: bold;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .total-box {
      color: #444;
      font-size: 13px;
      padding-bottom: 16px;
    }
    .footer {
      background: #0d47a1;
      color: white;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .btn {
      background: #00bcd4;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .btn:hover { background: #00e5ff; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-reset {
      background: transparent;
      color: #555;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 24px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { background: #1a1a2e; color: #aaa; border-color: #555; }

    /* ── FILTRO DE HORÁRIO ── */
    .filtro-panel {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .filtro-header {
      background: #0d47a1;
      color: #fff;
      padding: 16px 20px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      font-weight: bold;
    }
    .filtro-botoes {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
    }
    .btn-filtro {
      background: #111;
      color: #aaa;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-filtro:hover { background: #1a1a2e; border-color: #00bcd4; color: #fff; }
    .btn-filtro.ativo {
      background: #0d47a1;
      border-color: #00bcd4;
      color: #fff;
    }
    .btn-filtro .count {
      background: #00bcd4;
      color: #000;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: bold;
    }
    .btn-filtro.ativo .count { background: #fff; color: #0d47a1; }
    .btn-filtro-todos {
      background: #111;
      color: #00bcd4;
      border: 1px solid #00bcd4;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      margin: 0 16px 16px;
    }
    .btn-filtro-todos:hover { background: #00bcd4; color: #000; }
    .btn-filtro-todos.ativo { background: #00bcd4; color: #000; }
    .filtro-info {
      color: #444;
      font-size: 12px;
      text-align: center;
      padding: 0 16px 16px;
    }

    /* ── PAINEL VENCEDORES ── */
    .vencedores-panel {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      width: 280px;
      min-height: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .vencedores-header {
      background: #0d47a1;
      color: #fff;
      padding: 16px 20px;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      font-weight: bold;
    }
    .vencedores-sub {
      color: #555;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
      padding: 6px 0 4px;
      border-bottom: 1px solid #111;
    }
    .vencedores-lista {
      list-style: none;
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .vencedores-lista::-webkit-scrollbar { width: 4px; }
    .vencedores-lista::-webkit-scrollbar-track { background: #111; }
    .vencedores-lista::-webkit-scrollbar-thumb { background: #0d47a1; border-radius: 2px; }
    .vencedores-lista li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #111;
      animation: entrar 0.35s ease;
    }
    .vencedores-lista li:last-child { border-bottom: none; }
    .num-badge {
      background: #0d47a1;
      color: #fff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .venc-nome { color: #00e676; font-size: 15px; font-weight: bold; }
    .vencedores-empty {
      color: #333;
      font-size: 13px;
      text-align: center;
      padding: 32px 16px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .vencedores-footer {
      background: #111;
      color: #555;
      font-size: 12px;
      text-align: center;
      padding: 10px;
      border-top: 1px solid #1a1a2e;
    }

    @keyframes rolando {
      0%   { opacity: 0.3; transform: scale(0.95); }
      50%  { opacity: 1;   transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(0.95); }
    }
    .animando { animation: rolando 0.15s infinite; }

    @keyframes entrar {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <!-- CARD SORTEIO -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div class="card">
      <div class="header">Projeto Família Feliz</div>
      <div class="sub">SORTEIO DO DIA</div>
      <div class="nome-box" id="nome">Carregando...</div>
      <div class="total-box" id="total"></div>
      <div class="footer">Família Feliz</div>
    </div>
    <div class="btn-wrap">
      <button class="btn" id="btn" onclick="sortear()" disabled>Carregando...</button>
      <button class="btn-reset" onclick="resetarSorteio()">↺ Reiniciar sorteio</button>
    </div>
  </div>

  <!-- FILTRO DE HORÁRIO -->
  <div style="display:flex;flex-direction:column;gap:16px;align-items:center;">
    <div class="filtro-panel">
      <div class="filtro-header">Filtro de presença por horário</div>
      <div class="filtro-botoes">
        <button class="btn-filtro" id="filtro-1" onclick="aplicarFiltro(1)">
          <span>🕖 19h00 – 19h30</span>
          <span class="count" id="count-1">0</span>
        </button>
        <button class="btn-filtro" id="filtro-2" onclick="aplicarFiltro(2)">
          <span>🕖 19h30 – 20h00</span>
          <span class="count" id="count-2">0</span>
        </button>
        <button class="btn-filtro" id="filtro-3" onclick="aplicarFiltro(3)">
          <span>🕗 20h00 – 20h30</span>
          <span class="count" id="count-3">0</span>
        </button>
      </div>
      <button class="btn-filtro-todos" id="filtro-todos" onclick="aplicarFiltro(0)">
        Todos os presentes
      </button>
      <div class="filtro-info" id="filtro-info">Nenhum filtro aplicado</div>
    </div>
  </div>

  <!-- PAINEL VENCEDORES -->
  <div class="vencedores-panel">
    <div class="vencedores-header">🏆 Vencedores</div>
    <div class="vencedores-sub" id="venc-sub">Nenhum sorteado ainda</div>
    <div id="venc-corpo" style="flex:1;display:flex;flex-direction:column;">
      <div class="vencedores-empty" id="venc-empty">Os sorteados aparecerão aqui</div>
      <ul class="vencedores-lista" id="venc-lista" style="display:none;"></ul>
    </div>
    <div class="vencedores-footer" id="venc-footer">0 / 0 sorteados</div>
  </div>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz3TuVvyJqUEGcbIPKaIpU_yLs-xdppeCVPxCUoh3OIBBqLTUlszWV-4UKw2nj8KlHP/exec?acao=sorteio&callback=receberDados";

    let todosDados     = []; // [{nome, hora}]
    let disponiveis    = [];
    let vencedores     = [];
    let filtroAtivo    = 0;
    let intervalo      = null;

    const FAIXAS = [
      null,
      { label: "19h00 – 19h30", hIni: 19, mIni: 0,  hFim: 19, mFim: 30 },
      { label: "19h30 – 20h00", hIni: 19, mIni: 30, hFim: 20, mFim: 0  },
      { label: "20h00 – 20h30", hIni: 20, mIni: 0,  hFim: 20, mFim: 30 },
    ];

    function receberDados(data) {
      todosDados = data.presentes.map(p => {
        if (typeof p === "object") return { nome: String(p.nome).trim(), hora: p.hora || "" };
        return { nome: String(p).trim(), hora: "" };
      }).filter(p => p.nome);

      atualizarContadores();
      aplicarFiltro(0);
    }

    function dentroDaFaixa(horaStr, faixa) {
      if (!horaStr) return false;
      const partes = String(horaStr).split(":");
      if (partes.length < 2) return false;
      const h = parseInt(partes[0]);
      const m = parseInt(partes[1]);
      const totalMin = h * 60 + m;
      const iniMin   = faixa.hIni * 60 + faixa.mIni;
      const fimMin   = faixa.hFim * 60 + faixa.mFim;
      return totalMin >= iniMin && totalMin < fimMin;
    }

    function atualizarContadores() {
      for (let i = 1; i <= 3; i++) {
        const c = todosDados.filter(p => dentroDaFaixa(p.hora, FAIXAS[i])).length;
        document.getElementById("count-" + i).textContent = c;
      }
    }

    function aplicarFiltro(num) {
      filtroAtivo = num;
      vencedores  = [];

      // Atualiza botões
      document.getElementById("filtro-todos").classList.toggle("ativo", num === 0);
      for (let i = 1; i <= 3; i++) {
        document.getElementById("filtro-" + i).classList.toggle("ativo", num === i);
      }

      // Filtra lista
      if (num === 0) {
        disponiveis = todosDados.map(p => p.nome);
        document.getElementById("filtro-info").textContent = "Mostrando todos os presentes";
      } else {
        disponiveis = todosDados.filter(p => dentroDaFaixa(p.hora, FAIXAS[num])).map(p => p.nome);
        document.getElementById("filtro-info").textContent =
          "Faixa: " + FAIXAS[num].label + " · " + disponiveis.length + " pessoa(s)";
      }

      // Remove duplicatas
      disponiveis = [...new Set(disponiveis)];

      const nomeEl = document.getElementById("nome");
      nomeEl.textContent = disponiveis.length > 0 ? "Pressione sortear!" : "Nenhum presente nesse horário";
      nomeEl.style.color = "#ffd600";

      atualizarUI();
    }

    function atualizarUI() {
      const btn   = document.getElementById("btn");
      const total = document.getElementById("total");

      if (disponiveis.length === 0) {
        total.textContent = "0 disponíveis";
        btn.textContent   = "SORTEAR";
        btn.disabled      = true;
      } else {
        total.textContent = disponiveis.length + " disponível(is)";
        btn.textContent   = vencedores.length === 0 ? "SORTEAR" : "SORTEAR NOVAMENTE";
        btn.disabled      = false;
        document.getElementById("nome").style.color = "#ffd600";
      }

      atualizarPainelVencedores();
    }

    function sortear() {
      if (disponiveis.length === 0) return;
      const btn    = document.getElementById("btn");
      const nomeEl = document.getElementById("nome");

      btn.disabled = true;
      nomeEl.style.color = "#ffd600";
      nomeEl.classList.add("animando");

      let contador = 0;
      intervalo = setInterval(() => {
        nomeEl.textContent = disponiveis[Math.floor(Math.random() * disponiveis.length)];
        contador++;
        if (contador >= 30) {
          clearInterval(intervalo);
          nomeEl.classList.remove("animando");
          const vencIdx  = Math.floor(Math.random() * disponiveis.length);
          const vencedor = disponiveis[vencIdx];
          disponiveis.splice(vencIdx, 1);
          vencedores.push(vencedor);
          nomeEl.textContent = vencedor;
          nomeEl.style.color = "#00e676";
          atualizarUI();
        }
      }, 80);
    }

    function resetarSorteio() {
      if (!confirm("Reiniciar o sorteio? Os vencedores serão apagados.")) return;
      aplicarFiltro(filtroAtivo);
    }

    function atualizarPainelVencedores() {
      const lista  = document.getElementById("venc-lista");
      const empty  = document.getElementById("venc-empty");
      const sub    = document.getElementById("venc-sub");
      const footer = document.getElementById("venc-footer");
      const total  = filtroAtivo === 0
        ? todosDados.length
        : todosDados.filter(p => dentroDaFaixa(p.hora, FAIXAS[filtroAtivo])).length;

      footer.textContent = vencedores.length + " / " + total + " sorteados";

      if (vencedores.length === 0) {
        empty.style.display = "flex";
        lista.style.display = "none";
        sub.textContent     = "Nenhum sorteado ainda";
        return;
      }

      empty.style.display = "none";
      lista.style.display = "block";
      sub.textContent     = vencedores.length === 1 ? "1 pessoa sorteada" : vencedores.length + " pessoas sorteadas";

      lista.innerHTML = "";
      [...vencedores].reverse().forEach((nome, i) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="num-badge">${vencedores.length - i}</span><span class="venc-nome">${nome}</span>`;
        lista.appendChild(li);
      });
    }

    var script = document.createElement("script");
    script.src = URL_SCRIPT;
    document.head.appendChild(script);
  </script>
</body>
</html>
